<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     .font_big{
        font-size: 2em;
     }
     .font_style1{
        font-style: italic;
        font-weight: bold;
        text-align: center;
        color: green;
     }

     .button{
        width: 150px;
        height: 70px;
        background-color: orange;
        border-width: 10px;
        border-style: solid;
        border-color: white;
        border-radius: 30px;
        box-shadow: 5px 5px 5px #a9a9a9;
    }
    .button > a{
        display: block;
        line-height: 70px;
        text-decoration : none;
    }
    </style>
</head>
<body>
    <div class = "button">
        <a class ="font_big font_style1" href=" https://www.naver.com">Naver</a>
    </div>
</body>
</html>
