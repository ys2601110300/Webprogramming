<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            position:absolute;
        }

        .box:nth-child(1){
            background-color: #ff0000;;
            left: 10px;
            top: 10px;
            z-index: 100;
        }

        .box:nth-child(2){
            background-color: aquamarine;
            left: 50px;
            top: 50px;
            z-index: 50;
        }

        .box:nth-child(3){
            background-color:deeppink;
            left: 90px;
            top: 90px;
        }
        body > div{
            width: 500px;
            height: 100px;
            position: relative;
            border-width: 10px;
            border-style: solid;
            border-color: black;
            overflow: scroll;
        }
    </style>
</head>
<body>
    <h1>Box의 위쪽에 있는 h1</h1>
    <div>
    <div class = "box"></div>
    <div class = "box"></div>
    <div class = "box"></div>
    </div>
    <h1>Box의 아래쪽에 있는 h1</h1>
</body>
</html>
