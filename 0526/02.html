<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>익명함수 선언</title>
    <script>
        let anmFunc = function() {
            alert("익명함수입니다.");
        }

        anmFunc = function(){
            alert("2> 익명함수입니다.2");
        }

        // alert(typeof (anmFunc) + "!" + anmFunc);
    </script>
</head>
<body>
    <button onclick="anmFunc()">익명함수 호출</button>
</body>
</html>
