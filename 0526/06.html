<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반환값이 있는 선언적 함수</title>
    <script>
        function tenTimes(callback){
            for(let i = 0; i < 10; i++){
                callback();
            }
        }

        //let fun = function(){
        //    alert("익명함수 호출");
        //}
        
        tenTimes(function(){
            alert("익명함수 호출");
        });
    </script>
</head>
<body>

</body>
</html>
