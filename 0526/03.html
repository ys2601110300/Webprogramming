<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선언적 함수와 익명함수 실행 우선순위</title>
    <script>
        function anmFunc() {
            alert("선언적 함수입니다..");
        }

        anmFunc = function(){
            alert("익명 함수입니다.");
        }

        // alert(typeof (anmFunc) + "!" + anmFunc);
    </script>
</head>
<body>
    <button onclick="anmFunc()">익명함수 호출</button>
</body>
</html>
