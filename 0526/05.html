<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반환값이 있는 선언적 함수</title>
    <script>
        function power(x, y){
            let result = 1;
            for (let i = 0; i < y; i++){
                result *= x;
            }
            return result;
        }
    </script>
</head>
<body>
    <button onclick="alert(power(7, 3))">세제곱승 계산결과</button>
</body>
</html>
