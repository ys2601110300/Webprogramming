<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자바스크립트 객체 사용 방법</title>
    <script>
        let product = {
            제품명: "맥북 에어",
            유형: "노트북",
            가격: 1500000,
            제조사: "애플"
        }

        for(let key in product){
            alert(key + " : " + product[key]);
        }
    </script>
</head>
<body>

</body>
</html>
