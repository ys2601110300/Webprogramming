<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Model (DOM)</title>
</head>
<body>
    <h1>DOM Manipulation Example</h1>
    <h2>DOM은 문서 객체 모델</h2>
    <script>
        document.querySelector("h1").style.backgroundColor = "Cyan";
        document.querySelector("h2").style.color = "magenta";
    </script>
</body>
</html>
