<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록</title>
</head>
<body>
    <h3>순서가 없는 목록</h3>
    <ul type="circle"> <!-- disc(default) | circle | square -->
        <li>멜론</li>
        <li>망고</li>
        <li>귤</li>
    </ul>

    <h3>순서가 없는 목록</h3>
    <ul type="disc">
        <li>멜론</li>
        <li>망고</li>
        <li>귤</li>
    </ul>

    <h3>순서가 없는 목록</h3>
    <ul type="square">
        <li>멜론</li>
        <li>망고</li>
        <li>귤</li>
    </ul>

    <h3>순서가 있는 목록</h3>
    <ol type="1"> <!-- 1(default) | A | a | I | i -->
        <li>멜론</li>
        <li>망고</li>
        <li>귤</li>
    </ol>

    <h3>순서가 있는 목록</h3>
    <ol type="A"> <!-- 1(default) | A | a | I | i -->
        <li>멜론</li>
        <li>망고</li>
        <li>귤</li>
    </ol>

    <h3>순서가 있는 목록</h3>
    <ol type="a"> <!-- 1(default) | A | a | I | i -->
        <li>멜론</li>
        <li>망고</li>
        <li>귤</li>
    </ol>

    <h3>순서가 있는 목록</h3>
    <ol type="I"> <!-- 1(default) | A | a | I | i -->
        <li>멜론</li>
        <li>망고</li>
        <li>귤</li>
    </ol>

    <h3>순서가 있는 목록</h3>
    <ol type="i"> <!-- 1(default) | A | a | I | i -->
        <li>멜론</li>
        <li>망고</li>
        <li>귤</li>
    </ol>
</body>
</html>
