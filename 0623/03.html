<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        window.onload = function(){
            let count = 0;
            let image = document.getElementById("image");
            let frames = ["images/0.png", "images/1.png", "images/2.png", "images/3.png", "images/4.png", "images/5.png", "images/6.png", "images/7.png", "images/8.png"
                        ,"images/9.png", "images/10.png", "images/11.png", "images/12.png", "images/13.png", "images/14.png"];

            setInterval (function(){
                image.src = frames[count % frames.length];
                count++;
            }, 1000/20);
        }
    </script>
</head>
<body>
    <img id = "image">
</body>
</html>
