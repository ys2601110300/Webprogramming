<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        window.onload = function(){
            let count = 0;
            let image = document.getElementById("image");
    
            setInterval (function(){
                image.src = "images/" + (count % 15) + ".png";
                count++;
            }, 1000/20);
        }
    </script>
</head>
<body>
    <img id = "image">
</body>
</html>
