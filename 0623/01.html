<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <script src ="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        $(document).ready(
            function(){
                let clearQueue = false;

                let goToEnd = false;

                $("#clearQueue").change(
                    function(){
                        clearQueue = $(this).prop("checked");
                    }
                );

                $("#gotoEnd").change(
                    function(){
                        goToEnd = $(this).prop("checked");
                    }
                );

                $("#stopBtn").click(
                    function(){
                       $("box").stop(clearQueue, goToEnd);
                    }
                );

                $("#box").css({
                    width: 100,
                    height : 100,
                    background: "magenta"
                });

                $("#box").animate({
                        width: 200
                    }, 1000)
                    .delay(1000)
                    .animate({
                        width: 100
                    }, 1000);

                //setInterval(function(){
                    
                //}, 3000);
            }
        ); 
     </script>
</head>
<body>
    <label>clearQueue</label>
    <input type = "checkbox" id = "clearQueue">
    <br>
    <label>gotoEnd</label>
    <input type = "checkbox" id = "clearQueue">
    <br>
    <button id = "stopBtn">Stop</button>
    <div id ="box"></div>
</body>
</html>
