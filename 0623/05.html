<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src ="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        $(document).ready(
            function(){
                for(let i = 0; i < 10; i++){
                    let hElement = $("<h1>Created H1 Element Object + " + i + "</h1>");
                    hElement.css({
                        backgroundColor : "orange",
                        color : "white"
                    });
                    $("body").append(hElement);

                    hElement.dbclick(
                        function(){
                            $(this).remove();
                        }
                    );
                }
            }
        );
    </script>
</head>
<body>
    
</body>
</html>
