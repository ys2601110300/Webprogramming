<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href = "jquery.lightbox.css">
    <script src = "http://code.jquery.com/jquery-4.0.0.js"></script>
    <script src = "jquery.lightbox.js"></script>
    <script>
        $(document).ready(
            function(){
                $("a.lightbox").lightBox();
            }
        )
    </script>
</head>
<body>
    <a class = "lightbox" href = "image1.jpg"><img src = "image1.jpg" width = "50"></a>
    <a class = "lightbox" href = "image2.jpg"><img src = "image2.jpg" width = "50"></a>
    <a class = "lightbox" href = "image3.jpg"><img src = "image3.jpg" width = "50"></a>
</body>
</html>
