<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
    let r = 7;
    const PI = Math.PI;

    // 원의 둘레
    let circum = 2 * PI * r;
    alert("반지름이 " + r + "cm인 원의 둘레: " + circum + "cm");

    // 원의 넓이
    let area = PI * r * r;
    alert("원의 넓이: " + area + "cm²");
    </script>
</head>
<body>

</body>
</html>
