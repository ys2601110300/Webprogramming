<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        const PI = Math.PI;
        function circleCalc(r){
            // 원의 둘레
            let circum = 2 * PI * r;
            let area = PI * r * r;
            alert("반지름이 " + r + "cm인 원의 둘레: " + circum + "cm" + "원의 넓이: " + area + "cm²");
        } 
        circleCalc(7);
        circleCalc(10);
        circleCalc(15);
    </script>
</head>
<body>

</body>
</html>
