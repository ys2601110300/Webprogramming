<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <script src ="https://code.jquery.com/jquery-4.0.0.js"></script>
     <script>
        $(document).ready(
            function(){
                $("#box").css({
                    width: "100px",
                    height: "100px",
                    background: "orange"
                }
                ).on({
                    click: function(){
                        $(this).css("background", "red");
                    },
                    mouseenter: function(){
                        $(this).css("background", "blue");
                    },
                    mouseleave: function(){
                        $(this).css("background", "orange");
                    }
                });

                $("a").on("click",function(event){
                    alert("링크가 클릭되었습니다.");
                    event.preventDefault();
                })
            }
        ); 
     </script>
</head>
<body>
    <div id = "box"></div>
    <a href = "https://www.naver.com">Naver Homepage</a>
</body>
</html>
