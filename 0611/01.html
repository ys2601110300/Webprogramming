<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    #box{
        width: 100px;
        height : 100px;
        background-color: rgb(240,5,5);
    }

    #box.hover{
        background-color: rgb(20, 222, 17);
        border-radius: 50px;    
    }
    </style>
    <script src ="https://code.jquery.com/jquery-4.0.0.js"></script>
     <script>
        $(document).ready(
            function(){
                $("#box").hover(
                    function(){
                        $(this).addClass("hover");
                    },
                    function(){
                        $(this).removeClass("hover");
                    }  
                );
            }
        );
     </script>
</head>
<body>
    <div id = "box"></div>
</body>
</html>
