<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요소객체의 속성 설정 및 속성 값 반환</title>
    <script>
        window.onload = function(){
            document.body.setAttribute("title", "속성 설정하기")
            let titleValue = document.body.getAttribute("title");
            alert("title 속성의 값 : " + titleValue);
        }
    </script>
</head>
